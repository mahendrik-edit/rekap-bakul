<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Rekap Dagang - Broker Ayam</title>
    <style>
        /* ============================================================
           RESET & VARIABEL
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --ios-blue: #007AFF;
            --ios-blue-hover: #0055CC;
            --ios-green: #34C759;
            --ios-red: #FF3B30;
            --ios-orange: #FF9500;
            --ios-purple: #AF52DE;
            --ios-gray: #8E8E93;
            --ios-gray-light: #F2F2F7;
            --ios-gray-bg: #F2F2F7;
            --ios-white: #FFFFFF;
            --ios-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            --ios-shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.12);
            --ios-radius: 20px;
            --ios-radius-sm: 12px;
            --ios-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            --ios-transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        body {
            font-family: var(--ios-font);
            background: var(--ios-gray-bg);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1C1C1E;
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s, color 0.3s;
        }
        body.dark-mode {
            --ios-gray-bg: #000000;
            --ios-white: #1C1C1E;
            --ios-gray-light: #2C2C2E;
            --ios-gray: #AEAEB2;
            --ios-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            --ios-shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.6);
            background: #000000;
            color: #FFFFFF;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: var(--ios-white);
            border-radius: var(--ios-radius);
            padding: 32px 24px 28px;
            box-shadow: var(--ios-shadow-lg);
            text-align: center;
            transition: var(--ios-transition);
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--ios-blue), var(--ios-green), var(--ios-blue));
            background-size: 200% 100%;
            animation: gradientMove 4s ease-in-out infinite;
        }
        @keyframes gradientMove {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        .logo-wrapper {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #007AFF, #0055CC);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.3);
            transition: var(--ios-transition);
        }
        .logo-wrapper:hover {
            transform: scale(1.04) rotate(-4deg);
            box-shadow: 0 12px 32px rgba(0, 122, 255, 0.4);
        }
        .logo-wrapper svg {
            width: 36px;
            height: 36px;
            fill: white;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.6px;
            color: #1C1C1E;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 15px;
            color: var(--ios-gray);
            font-weight: 400;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        /* ===== STATS MINI ===== */
        .stats-mini {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0 24px;
        }
        .stat-mini-item {
            background: var(--ios-gray-light);
            border-radius: var(--ios-radius-sm);
            padding: 14px 8px;
            text-align: center;
            transition: var(--ios-transition);
        }
        .stat-mini-item:hover {
            transform: translateY(-2px);
        }
        .stat-mini-item .num {
            font-size: 20px;
            font-weight: 700;
            color: var(--ios-blue);
        }
        .stat-mini-item .num.green {
            color: var(--ios-green);
        }
        .stat-mini-item .num.orange {
            color: var(--ios-orange);
        }
        .stat-mini-item .lbl {
            font-size: 11px;
            color: var(--ios-gray);
            font-weight: 500;
            margin-top: 2px;
        }
        .loading-text {
            font-size: 12px;
            color: var(--ios-gray);
            font-weight: 400;
        }

        /* ===== MENU CARD ===== */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 20px 0;
        }
        .menu-card {
            background: var(--ios-gray-light);
            border-radius: var(--ios-radius-sm);
            padding: 20px 16px;
            text-decoration: none;
            color: inherit;
            transition: var(--ios-transition);
            border: 1.5px solid transparent;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .menu-card:hover {
            transform: translateY(-4px);
            border-color: var(--ios-blue);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }
        .menu-card:active {
            transform: scale(0.97);
        }
        .menu-card .icon {
            font-size: 32px;
            display: block;
            margin-bottom: 6px;
        }
        .menu-card .title {
            font-size: 16px;
            font-weight: 600;
        }
        .menu-card .desc {
            font-size: 12px;
            color: var(--ios-gray);
            margin-top: 2px;
        }
        .menu-card .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
            color: white;
        }
        .menu-card.supir .badge {
            background: var(--ios-blue);
        }
        .menu-card.pemilik .badge {
            background: var(--ios-green);
        }
        .menu-card .arrow {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 14px;
            opacity: 0.3;
            transition: var(--ios-transition);
        }
        .menu-card:hover .arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 28px;
            padding-top: 18px;
            border-top: 1px solid #E5E5EA;
            font-size: 12px;
            color: var(--ios-gray);
            letter-spacing: 0.2px;
        }
        .footer .heart {
            color: var(--ios-red);
            display: inline-block;
            animation: heartBeat 1.8s ease-in-out infinite;
        }
        @keyframes heartBeat {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        /* ===== THEME TOGGLE ===== */
        .theme-toggle {
            background: var(--ios-gray-light);
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 16px;
            cursor: pointer;
            transition: var(--ios-transition);
            font-family: var(--ios-font);
            position: absolute;
            top: 16px;
            right: 16px;
        }
        .theme-toggle:hover {
            transform: scale(1.05);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 500px) {
            .container {
                padding: 24px 16px 24px;
                border-radius: 18px;
            }
            .logo-wrapper {
                width: 60px;
                height: 60px;
            }
            .logo-wrapper svg {
                width: 30px;
                height: 30px;
            }
            h1 {
                font-size: 24px;
            }
            .stats-mini {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            .stat-mini-item .num {
                font-size: 17px;
            }
            .menu-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .menu-card {
                padding: 14px 16px;
            }
            .menu-card .icon {
                font-size: 28px;
            }
            .menu-card .title {
                font-size: 15px;
            }
            .menu-card .desc {
                font-size: 12px;
            }
            .menu-card .badge {
                font-size: 9px;
                padding: 1px 10px;
                top: 10px;
                right: 10px;
            }
            .theme-toggle {
                top: 12px;
                right: 12px;
                font-size: 14px;
                padding: 3px 10px;
            }
        }
        @media (max-width: 380px) {
            .container {
                padding: 18px 12px 20px;
            }
            h1 {
                font-size: 20px;
            }
            .stats-mini {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
            }
            .stat-mini-item .num {
                font-size: 15px;
            }
            .stat-mini-item .lbl {
                font-size: 10px;
            }
            .logo-wrapper {
                width: 50px;
                height: 50px;
            }
            .logo-wrapper svg {
                width: 24px;
                height: 24px;
            }
        }

        /* Dark mode overrides */
        body.dark-mode .menu-card:hover {
            border-color: var(--ios-blue);
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.15);
        }
        body.dark-mode .stat-mini-item:hover {
            background: #3A3A3C;
        }
        body.dark-mode .theme-toggle {
            background: #3A3A3C;
            color: white;
        }
        body.dark-mode .footer {
            border-top-color: #3A3A3C;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- THEME TOGGLE -->
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
            🌙
        </button>

        <!-- LOGO -->
        <div class="logo-wrapper">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
            </svg>
        </div>

        <h1>Rekap Dagang</h1>
        <p class="subtitle">Sistem pencatatan keuangan kemitraan</p>

        <!-- STATS MINI (DATA REAL-TIME) -->
        <div class="stats-mini">
            <div class="stat-mini-item">
                <div class="num" id="statTonase">-</div>
                <div class="lbl">🐓 Tonase (kg)</div>
            </div>
            <div class="stat-mini-item">
                <div class="num green" id="statPendapatan">-</div>
                <div class="lbl">💰 Pendapatan</div>
            </div>
            <div class="stat-mini-item">
                <div class="num orange" id="statTransaksi">-</div>
                <div class="lbl">📦 Transaksi</div>
            </div>
        </div>

        <!-- MENU -->
        <div class="menu-grid">
            <a href="supir.html" class="menu-card supir">
                <span class="badge">Supir</span>
                <span class="icon">📝</span>
                <div class="title">Input Data</div>
                <div class="desc">Untuk supir mengisi transaksi harian</div>
                <span class="arrow">→</span>
            </a>
            <a href="pemilik.html" class="menu-card pemilik">
                <span class="badge">Pemilik</span>
                <span class="icon">📊</span>
                <div class="title">Laporan</div>
                <div class="desc">Untuk pemilik melihat rekap &amp; kelola harga</div>
                <span class="arrow">→</span>
            </a>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            © 2026 Rekap Dagang &nbsp;·&nbsp; Dibuat dengan <span class="heart">❤</span>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. DARK MODE TOGGLE
        // ============================================================
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.querySelector('.theme-toggle').textContent = isDark ? '☀️' : '🌙';
        }

        // Load saved theme
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }

        // ============================================================
        // 2. AMBIL DATA REAL-TIME DARI GOOGLE SHEETS
        // ============================================================
        const SPREADSHEET_ID = '11NF6Yx8Sb8G7QK4e3QABdOSRaUdbOa187HlBHdWlyZI';
        const API_KEY = 'AIzaSyB4hhr2H9w3pzeHr9esP0i9ljNJU-gWtic';

        async function loadData() {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/DATA_TRANSAKSI?key=${API_KEY}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                const rows = data.values || [];

                // Header: No, Tanggal, Kemitraan, Kandang, Bakul, Tonase, HargaBeli, HargaJual, TotalPenjualan, TotalBiaya, Laba, BiayaMakanTotal, JasaAngkutTotal, Setoran
                // Ambil data mulai dari baris 2 (index 1)
                const transaksi = rows.slice(1);

                let totalTonase = 0;
                let totalPendapatan = 0;

                transaksi.forEach(row => {
                    const tonase = parseFloat(row[5]) || 0;
                    const pendapatan = parseFloat(row[8]) || 0; // Total Penjualan
                    totalTonase += tonase;
                    totalPendapatan += pendapatan;
                });

                const totalTransaksi = transaksi.length;

                // Update elemen HTML
                document.getElementById('statTonase').textContent = totalTonase.toFixed(1) + ' kg';
                document.getElementById('statPendapatan').textContent = 'Rp ' + totalPendapatan.toLocaleString('id-ID');
                document.getElementById('statTransaksi').textContent = totalTransaksi;

            } catch (error) {
                console.error('Error loading data:', error);
                // Tampilkan pesan error jika gagal
                document.getElementById('statTonase').textContent = '⚠️ Error';
                document.getElementById('statPendapatan').textContent = '⚠️ Error';
                document.getElementById('statTransaksi').textContent = '⚠️ Error';
            }
        }

        // ============================================================
        // 3. LOAD DATA SAAT HALAMAN DIMUAT
        // ============================================================
        window.onload = function() {
            loadData();
        };
    </script>
</body>
</html>
